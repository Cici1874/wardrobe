<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F0EB">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>衣橱利用率</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0EB;
    --card: #FFFFFF;
    --card-shadow: rgba(180, 170, 158, 0.15);
    --text-primary: #4A4540;
    --text-secondary: #8C847A;
    --text-muted: #B5ADA3;
    --accent: #B8A590;
    --accent-soft: #D4C8BA;
    --sage: #A3B5A0;
    --sage-soft: #D0DBCE;
    --rose: #C4A0A0;
    --rose-soft: #E0CCCC;
    --lavender: #A8A0B5;
    --lavender-soft: #CCC5D8;
    --taupe: #B5ADA0;
    --taupe-soft: #D8D2C8;
    --border: #E8E2DA;
    --hover: #F0EAE3;
    --badge-text: #6B8068;
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    padding-bottom: 80px;
    overscroll-behavior: none;
  }
  h1, h2, h3, .tab-label, .btn, .category-tag {
    font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
  }

  /* Header */
  .header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .header-gear {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: var(--hover); cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .header-gear:active { background: var(--border); }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
    background: rgba(245, 240, 235, 0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding-bottom: env(safe-area-inset-bottom, 0); z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; padding: 8px 16px; border-radius: 12px;
    transition: all 0.2s; border: none; background: none;
    font-family: 'Quicksand', sans-serif;
  }
  .nav-item .nav-icon { font-size: 22px; }
  .nav-item .nav-label { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .nav-item.active .nav-label { color: var(--accent); }
  .nav-item.active { background: rgba(184, 165, 144, 0.12); }

  /* Category Tabs */
  .category-tabs {
    display: flex; gap: 8px; padding: 0 20px 14px;
    overflow-x: auto; scrollbar-width: none;
  }
  .category-tabs::-webkit-scrollbar { display: none; }
  .category-tag {
    flex-shrink: 0; padding: 6px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 600; border: 1.5px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .category-tag.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Sort Bar */
  .sort-bar { display: flex; align-items: center; gap: 6px; padding: 0 20px 12px; }
  .sort-btn {
    font-size: 12px; font-weight: 500; color: var(--text-muted);
    background: none; border: none; cursor: pointer; padding: 4px 10px;
    border-radius: 8px; font-family: 'Quicksand', sans-serif; transition: all 0.15s;
  }
  .sort-btn.active {
    color: var(--text-primary); background: var(--card);
    box-shadow: 0 1px 4px var(--card-shadow);
  }

  /* Wardrobe Grid */
  .wardrobe-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; padding: 0 16px;
  }
  .clothing-card {
    position: relative; background: var(--card); border-radius: var(--radius);
    overflow: hidden; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px var(--card-shadow);
    aspect-ratio: 3/4; display: flex; flex-direction: column; user-select: none;
  }
  .clothing-card:active { transform: scale(0.96); }
  .clothing-card.just-tapped { animation: tapPulse 0.4s ease; }
  @keyframes tapPulse {
    0% { box-shadow: 0 2px 8px var(--card-shadow); }
    50% { box-shadow: 0 2px 20px rgba(163, 181, 160, 0.4); }
    100% { box-shadow: 0 2px 8px var(--card-shadow); }
  }
  .card-image {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: var(--hover); overflow: hidden;
  }
  .card-image img { width: 100%; height: 100%; object-fit: cover; }
  .card-image .placeholder-icon { font-size: 36px; opacity: 0.3; }
  .card-info {
    padding: 6px 8px; display: flex; align-items: center;
    justify-content: space-between; gap: 4px;
  }
  .card-info-left { flex: 1; min-width: 0; }
  .card-name {
    font-size: 11px; font-weight: 500; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-sub { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .wear-badge {
    position: absolute; top: 6px; right: 6px;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
    border-radius: 10px; padding: 2px 8px;
    font-family: 'Quicksand', sans-serif; font-size: 12px; font-weight: 700;
    color: var(--badge-text); min-width: 28px; text-align: center;
  }
  .wear-badge.zero { color: var(--text-muted); opacity: 0.6; }
  .wear-btn {
    flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
    border: none; background: var(--sage); color: white;
    font-size: 16px; font-weight: 700; font-family: 'Quicksand', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s; line-height: 1;
  }
  .wear-btn:active { transform: scale(0.85); background: #8BA888; }

  /* Empty State */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 40px; text-align: center;
  }
  .empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state .empty-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text-primary); color: white;
    padding: 10px 20px; border-radius: 24px; font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 10px; z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15); white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast .undo-btn {
    background: rgba(255,255,255,0.2); border: none; color: white;
    padding: 3px 12px; border-radius: 12px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: 'Quicksand', sans-serif;
  }

  /* Stats */
  .stats-section { padding: 0 20px 20px; }
  .stats-overview {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px 12px; text-align: center;
    box-shadow: 0 2px 8px var(--card-shadow);
  }
  .stat-value {
    font-family: 'Quicksand', sans-serif; font-size: 28px; font-weight: 700;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .stat-value.accent { color: var(--sage); }
  .section-title {
    font-size: 15px; font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .cat-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .cat-bar-label { font-size: 12px; color: var(--text-secondary); width: 50px; flex-shrink: 0; text-align: right; }
  .cat-bar-track { flex: 1; height: 22px; background: var(--hover); border-radius: 11px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 11px; transition: width 0.5s ease; min-width: 2px; }
  .cat-bar-pct { font-family: 'Quicksand', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-secondary); width: 40px; flex-shrink: 0; }
  .rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .rank-item:last-child { border-bottom: none; }
  .rank-num { font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-muted); width: 20px; text-align: center; }
  .rank-num.top { color: var(--sage); }
  .rank-thumb { width: 40px; height: 40px; border-radius: 10px; background: var(--hover); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
  .rank-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .rank-thumb .placeholder-icon { font-size: 18px; opacity: 0.3; }
  .rank-name { flex: 1; font-size: 13px; font-weight: 500; }
  .rank-count { font-family: 'Quicksand', sans-serif; font-size: 16px; font-weight: 700; color: var(--sage); }
  .rank-count.dust { color: var(--rose); }

  /* Add Page */
  .add-section { padding: 0 20px 20px; }
  .add-mode-tabs { display: flex; gap: 0; margin-bottom: 20px; background: var(--hover); border-radius: 12px; padding: 3px; }
  .add-mode-tab {
    flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600;
    font-family: 'Quicksand', sans-serif; color: var(--text-muted);
    border: none; background: none; border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }
  .add-mode-tab.active { background: var(--card); color: var(--text-primary); box-shadow: 0 1px 4px var(--card-shadow); }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: block; font-family: 'Quicksand', sans-serif; }
  .form-input {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; font-family: 'Noto Sans SC', sans-serif;
    background: var(--card); color: var(--text-primary); outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text-muted); }
  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans SC', sans-serif;
  }
  .chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
  .chip.add-chip { border-style: dashed; color: var(--text-muted); font-size: 14px; }
  .chip.add-chip:hover { border-color: var(--accent-soft); }
  .chip.deletable { position: relative; padding-right: 28px; }
  .chip-delete {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; border-radius: 50%; border: none;
    background: rgba(0,0,0,0.15); color: white; font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .custom-subcat-input {
    display: flex; gap: 8px; margin-top: 8px;
  }
  .custom-subcat-input input {
    flex: 1; padding: 8px 12px; border: 1.5px solid var(--border);
    border-radius: 20px; font-size: 13px; font-family: 'Noto Sans SC', sans-serif;
    background: var(--card); outline: none;
  }
  .custom-subcat-input input:focus { border-color: var(--accent); }
  .custom-subcat-input button {
    padding: 8px 16px; border-radius: 20px; border: none;
    background: var(--sage); color: white; font-size: 13px; font-weight: 600;
    font-family: 'Quicksand', sans-serif; cursor: pointer;
  }
  .image-upload-area {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .image-upload-area:hover { border-color: var(--accent-soft); background: var(--hover); }
  .image-upload-area .upload-icon { font-size: 32px; opacity: 0.3; margin-bottom: 8px; }
  .image-upload-area .upload-text { font-size: 13px; color: var(--text-muted); }
  .image-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: var(--radius-sm); margin-top: 8px; }
  .btn-primary {
    width: 100%; padding: 14px; border: none; border-radius: var(--radius);
    background: var(--accent); color: white; font-size: 15px; font-weight: 600;
    font-family: 'Quicksand', sans-serif; cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .batch-preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
  .batch-preview-item { position: relative; aspect-ratio: 3/4; border-radius: var(--radius-sm); overflow: hidden; background: var(--hover); }
  .batch-preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .batch-remove {
    position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
    border-radius: 50%; background: rgba(0,0,0,0.5); color: white;
    border: none; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(74, 69, 64, 0.4); backdrop-filter: blur(4px);
    z-index: 300; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-sheet {
    background: var(--bg); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
    padding: 20px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.show .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-secondary {
    flex: 1; padding: 12px; border: 1.5px solid var(--border); border-radius: var(--radius);
    background: transparent; color: var(--text-secondary); font-size: 14px; font-weight: 600;
    font-family: 'Quicksand', sans-serif; cursor: pointer;
  }
  .btn-danger {
    padding: 12px 20px; border: none; border-radius: var(--radius);
    background: var(--rose-soft); color: #8B6B6B; font-size: 14px; font-weight: 600;
    font-family: 'Quicksand', sans-serif; cursor: pointer;
  }

  /* Settings */
  .settings-list { display: flex; flex-direction: column; gap: 10px; }
  .settings-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; background: var(--card); border-radius: var(--radius);
    cursor: pointer; transition: background 0.15s; border: none;
    width: 100%; text-align: left; font-family: 'Noto Sans SC', sans-serif;
  }
  .settings-item:active { background: var(--hover); }
  .settings-item .s-icon { font-size: 20px; }
  .settings-item .s-label { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .settings-item .s-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Update Log */
  .update-log-version { font-size: 13px; font-weight: 700; color: var(--sage); margin-bottom: 4px; font-family: 'Quicksand', sans-serif; }
  .update-log-date { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .update-log-list { list-style: none; padding: 0; margin: 0 0 16px; }
  .update-log-list li {
    font-size: 13px; color: var(--text-primary); padding: 5px 0;
    line-height: 1.5;
  }
  .update-log-divider { height: 1px; background: var(--border); margin: 12px 0; }

  /* Category Manager */
  .cat-mgr-group { margin-bottom: 20px; }
  .cat-mgr-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .cat-mgr-header .cat-icon { font-size: 18px; }
  .cat-mgr-name-input {
    flex: 1; font-size: 14px; font-weight: 600; font-family: 'Noto Sans SC', sans-serif;
    border: none; border-bottom: 1.5px solid transparent; background: transparent;
    color: var(--text-primary); padding: 4px 0; outline: none;
  }
  .cat-mgr-name-input:focus { border-bottom-color: var(--accent); }
  .cat-mgr-delete {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: var(--rose-soft); color: #8B6B6B; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .cat-mgr-subcats { padding-left: 30px; }
  .cat-mgr-subcat-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  }
  .cat-mgr-subcat-input {
    flex: 1; font-size: 13px; font-family: 'Noto Sans SC', sans-serif;
    border: none; border-bottom: 1px solid transparent; background: transparent;
    color: var(--text-secondary); padding: 3px 0; outline: none;
  }
  .cat-mgr-subcat-input:focus { border-bottom-color: var(--accent-soft); }
  .cat-mgr-sub-delete {
    width: 22px; height: 22px; border-radius: 50%; border: none;
    background: var(--hover); color: var(--text-muted); font-size: 11px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .cat-mgr-add-btn {
    font-size: 12px; color: var(--accent); background: none; border: 1px dashed var(--accent-soft);
    border-radius: 16px; padding: 4px 12px; cursor: pointer; font-family: 'Quicksand', sans-serif;
    margin-top: 4px;
  }
  .cat-mgr-add-cat {
    width: 100%; padding: 12px; border: 2px dashed var(--border); border-radius: var(--radius);
    background: transparent; color: var(--text-muted); font-size: 14px;
    cursor: pointer; font-family: 'Quicksand', sans-serif; margin-top: 8px;
  }
  .settings-item.danger { background: var(--rose-soft); }
  .settings-item.danger .s-label { color: #8B6B6B; }

  /* Selection Mode */
  .select-check {
    position: absolute; top: 6px; left: 6px;
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid white; background: rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: white; z-index: 2;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .select-check.checked { background: var(--sage); border-color: var(--sage); }
  .select-bar {
    position: fixed; bottom: 70px; left: 0; right: 0;
    background: var(--text-primary); color: white;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; z-index: 150;
    font-size: 14px; font-weight: 500;
  }
  .select-bar-actions { display: flex; gap: 8px; }
  .select-bar-btn {
    padding: 6px 16px; border-radius: 20px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Quicksand', sans-serif;
  }
  .select-bar-btn.cancel { background: rgba(255,255,255,0.2); color: white; }
  .select-bar-btn.delete { background: var(--rose); color: white; }

  /* Page */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ===== 版本 =====
const APP_VERSION = '1.4.0';
const UPDATE_LOG = [
  {
    version: '1.4.0',
    date: '2026-06-01',
    changes: [
      '📂 分类和子分类完全可自定义（重命名、删除、新增）',
      '🗑️ 多选批量删除衣服',
    ],
  },
  {
    version: '1.3.1',
    date: '2026-05-31',
    changes: ['🐛 修复首次同步：本地有数据时自动推送到云端'],
  },
  {
    version: '1.3.0',
    date: '2026-05-31',
    changes: ['☁️ 数据云端同步（Google Sheets），跨设备实时共享', '🐛 修复更新日志闪退'],
  },

// ===== localStorage =====
const STORAGE_KEY = 'wardrobe_items';
const CATS_KEY = 'wardrobe_full_categories';

function loadItems() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function saveItems(items) { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
function loadCategories() { try { const r = JSON.parse(localStorage.getItem(CATS_KEY)); return r && Object.keys(r).length > 0 ? r : { ...INITIAL_CATEGORIES }; } catch { return { ...INITIAL_CATEGORIES }; } }
function saveCategories(cats) { localStorage.setItem(CATS_KEY, JSON.stringify(cats)); }
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// ===== Cloudinary =====
const CLOUD_NAME = 'dfahiahjp';
const UPLOAD_PRESET = 'ml_default';

async function uploadToCloudinary(file) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', UPLOAD_PRESET);
  formData.append('folder', 'wardrobe');
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
  if (!res.ok) { const t = await res.text().catch(() => ''); throw new Error(`上传失败 (${res.status}): ${t}`); }
  return (await res.json()).secure_url;
}

// ===== 子分类选择器 =====
function SubcatPicker({ cat, subcat, setSubcat, categories, onUpdateCats }) {
  const [showInput, setShowInput] = useState(false);
  const [inputVal, setInputVal] = useState('');
  const inputRef = useRef(null);
  const subcats = categories[cat] || [];

  useEffect(() => { if (showInput && inputRef.current) inputRef.current.focus(); }, [showInput]);
  if (!cat) return null;

  const handleAdd = () => {
    const val = inputVal.trim();
    if (val && !subcats.includes(val)) {
      const next = { ...categories, [cat]: [...subcats, val] };
      onUpdateCats(next);
      setSubcat(val);
      setInputVal(''); setShowInput(false);
    }
  };

  return (
    <div className="form-group">
      <label className="form-label">子分类</label>
      <div className="chip-group">
        {subcats.map(sc => (
          <button key={sc} className={`chip ${subcat === sc ? 'selected' : ''}`}
            onClick={() => setSubcat(subcat === sc ? '' : sc)}>{sc}</button>
        ))}
        <button className="chip add-chip" onClick={() => setShowInput(!showInput)}>+ 自定义</button>
      </div>
      {showInput && (
        <div className="custom-subcat-input">
          <input ref={inputRef} placeholder="输入子分类名称" value={inputVal}
            onChange={e => setInputVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdd()} />
          <button onClick={handleAdd}>添加</button>
        </div>
      )}
    </div>
  );
}

// ===== 衣橱页 =====
function WardrobePage({ items, onWear, onEdit, categories, selectMode, selectedIds, onToggleSelect }) {
  const [activeCat, setActiveCat] = useState('全部');
  const [activeSubcat, setActiveSubcat] = useState('全部');
  const [sortBy, setSortBy] = useState('count');
  const allCats = ['全部', ...Object.keys(categories)];
  const subcats = activeCat !== '全部' ? (categories[activeCat] || []) : [];

  const filtered = items.filter(i => {
    if (activeCat !== '全部' && i.category !== activeCat) return false;
    if (activeSubcat !== '全部' && i.subcategory !== activeSubcat) return false;
    return true;
  });
  const sorted = [...filtered].sort((a, b) => sortBy === 'count' ? b.wearCount - a.wearCount : b.addedAt - a.addedAt);

  return (
    <div>
      <div className="category-tabs">
        {allCats.map(cat => (
          <button key={cat} className={`category-tag ${activeCat === cat ? 'active' : ''}`}
            onClick={() => { setActiveCat(cat); setActiveSubcat('全部'); }}
          >{cat === '全部' ? '全部' : `${getCatIcon(cat)} ${cat}`}</button>
        ))}
      </div>
      {subcats.length > 0 && (
        <div className="category-tabs">
          <button className={`category-tag ${activeSubcat === '全部' ? 'active' : ''}`}
            onClick={() => setActiveSubcat('全部')}>全部</button>
          {subcats.map(sc => (
            <button key={sc} className={`category-tag ${activeSubcat === sc ? 'active' : ''}`}
              onClick={() => setActiveSubcat(sc)}>{sc}</button>
          ))}
        </div>
      )}
      <div className="sort-bar">
        <button className={`sort-btn ${sortBy === 'count' ? 'active' : ''}`} onClick={() => setSortBy('count')}>按穿着次数</button>
        <button className={`sort-btn ${sortBy === 'added' ? 'active' : ''}`} onClick={() => setSortBy('added')}>按添加时间</button>
      </div>
      {sorted.length === 0 ? (
        <div className="empty-state"><div className="empty-icon">🪹</div>
          <div className="empty-text">{activeCat === '全部' ? '衣橱空空的\n去「添加」页面录入衣服吧' : `还没有${activeCat}`}</div></div>
      ) : (
        <div className="wardrobe-grid">{sorted.map(item => (
          <ClothingCard key={item.id} item={item}
            selectMode={selectMode}
            selected={selectedIds.has(item.id)}
            onToggleSelect={() => onToggleSelect(item.id)}
            onWear={() => onWear(item.id)}
            onEdit={() => onEdit(item)} />
        ))}</div>
      )}
    </div>
  );
}

// ===== 数据页 =====
function StatsPage({ items, categories }) {
  const total = items.length;
  const worn = items.filter(i => i.wearCount > 0).length;
  const utilRate = total > 0 ? Math.round((worn / total) * 100) : 0;
  const catStats = Object.keys(categories).map((cat, idx) => {
    const ci = items.filter(i => i.category === cat);
    const cw = ci.filter(i => i.wearCount > 0).length;
    return { cat, total: ci.length, worn: cw, rate: ci.length > 0 ? Math.round((cw / ci.length) * 100) : 0, color: getCatColor(cat, idx) };
  }).filter(s => s.total > 0);
  const top10 = [...items].sort((a, b) => b.wearCount - a.wearCount).filter(i => i.wearCount > 0).slice(0, 10);
  const dust10 = items.filter(i => i.wearCount === 0).slice(0, 10);

  if (total === 0) return (<div className="stats-section"><div className="empty-state"><div className="empty-icon">📊</div><div className="empty-text">还没有衣服数据</div></div></div>);

  return (
    <div className="stats-section">
      <div className="stats-overview">
        <div className="stat-card"><div className="stat-value">{total}</div><div className="stat-label">总件数</div></div>
        <div className="stat-card"><div className="stat-value">{worn}</div><div className="stat-label">穿过的</div></div>
        <div className="stat-card"><div className="stat-value accent">{utilRate}%</div><div className="stat-label">利用率</div></div>
      </div>
      {catStats.length > 0 && (<div style={{ marginBottom: 28 }}><div className="section-title">📂 分类利用率</div>
        {catStats.map(s => (<div className="cat-bar-row" key={s.cat}><div className="cat-bar-label">{s.cat}</div>
          <div className="cat-bar-track"><div className="cat-bar-fill" style={{ width: `${s.rate}%`, background: s.color }} /></div>
          <div className="cat-bar-pct">{s.rate}%</div></div>))}</div>)}
      {top10.length > 0 && (<div style={{ marginBottom: 28 }}><div className="section-title">👑 最常穿</div>
        {top10.map((item, i) => (<div className="rank-item" key={item.id}><div className={`rank-num ${i < 3 ? 'top' : ''}`}>{i + 1}</div>
          <div className="rank-thumb">{item.image ? <img src={item.image} alt="" /> : <span className="placeholder-icon">{getCatIcon(item.category)}</span>}</div>
          <div className="rank-name">{item.name || item.subcategory}</div><div className="rank-count">{item.wearCount}次</div></div>))}</div>)}
      {dust10.length > 0 && (<div><div className="section-title">🧹 吃灰王</div>
        {dust10.map((item, i) => (<div className="rank-item" key={item.id}><div className="rank-num">{i + 1}</div>
          <div className="rank-thumb">{item.image ? <img src={item.image} alt="" /> : <span className="placeholder-icon">{getCatIcon(item.category)}</span>}</div>
          <div className="rank-name">{item.name || item.subcategory}</div><div className="rank-count dust">0次</div></div>))}</div>)}
    </div>
  );
}

// ===== 添加页 =====
function AddPage({ onAdd, categories, onUpdateCats }) {
  const [mode, setMode] = useState('single');
  const [cat, setCat] = useState('');
  const [subcat, setSubcat] = useState('');
  const [name, setName] = useState('');
  const [image, setImage] = useState(null);
  const [batchImages, setBatchImages] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [uploadProgress, setUploadProgress] = useState('');
  const fileRef = useRef(null);
  const batchRef = useRef(null);

  const handleImageChange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    try { setUploading(true); setUploadProgress('上传中...'); setImage(await uploadToCloudinary(file)); }
    catch (err) { alert('图片上传失败: ' + err.message); }
    finally { setUploading(false); setUploadProgress(''); }
  };
  const handleBatchImages = async (e) => {
    const files = Array.from(e.target.files); if (!files.length) return;
    setUploading(true); const urls = []; let fail = 0;
    for (let i = 0; i < files.length; i++) {
      setUploadProgress(`上传中 ${i + 1}/${files.length}...`);
      try { urls.push(await uploadToCloudinary(files[i])); } catch { fail++; }
    }
    setBatchImages(prev => [...prev, ...urls]); setUploading(false); setUploadProgress('');
    if (fail > 0) alert(`${fail} 张失败，${urls.length} 张成功`);
  };

  const handleSingleAdd = () => {
    if (!cat) return;
    onAdd({ id: generateId(), name: name.trim(), category: cat, subcategory: subcat, image, wearCount: 0, addedAt: Date.now() });
    setName(''); setImage(null); setSubcat(''); if (fileRef.current) fileRef.current.value = '';
  };
  const handleBatchAdd = () => {
    if (!cat || !batchImages.length) return;
    batchImages.forEach((url, i) => {
      onAdd({ id: generateId(), name: `${subcat || cat} #${i + 1}`, category: cat, subcategory: subcat, image: url, wearCount: 0, addedAt: Date.now() + i });
    });
    setBatchImages([]); if (batchRef.current) batchRef.current.value = '';
  };

  return (
    <div className="add-section">
      <div className="add-mode-tabs">
        <button className={`add-mode-tab ${mode === 'single' ? 'active' : ''}`} onClick={() => setMode('single')}>单件添加</button>
        <button className={`add-mode-tab ${mode === 'batch' ? 'active' : ''}`} onClick={() => setMode('batch')}>批量添加</button>
      </div>
      <div className="form-group"><label className="form-label">分类 *</label>
        <div className="chip-group">{Object.keys(categories).map(c => (
          <button key={c} className={`chip ${cat === c ? 'selected' : ''}`}
            onClick={() => { setCat(c); setSubcat(''); }}>{getCatIcon(c)} {c}</button>
        ))}</div>
      </div>
      <SubcatPicker cat={cat} subcat={subcat} setSubcat={setSubcat} categories={categories} onUpdateCats={onUpdateCats} />
      {mode === 'single' ? (<>
        <div className="form-group"><label className="form-label">名字（可选）</label>
          <input className="form-input" placeholder="比如：黑色oversized那件" value={name} onChange={e => setName(e.target.value)} /></div>
        <div className="form-group"><label className="form-label">图片（可选）</label>
          <input type="file" accept="image/*" ref={fileRef} onChange={handleImageChange} style={{ display: 'none' }} />
          {uploading ? (<div className="image-upload-area"><div className="upload-icon">⏳</div><div className="upload-text">{uploadProgress}</div></div>)
            : image ? (<div style={{ position: 'relative' }}><img src={image} className="image-preview" />
              <button className="batch-remove" style={{ top: 12, right: 4 }} onClick={() => { setImage(null); fileRef.current.value = ''; }}>✕</button></div>)
            : (<div className="image-upload-area" onClick={() => fileRef.current.click()}><div className="upload-icon">📷</div><div className="upload-text">点击选择图片</div></div>)}
        </div>
        <button className="btn-primary" disabled={!cat || uploading} onClick={handleSingleAdd}>{uploading ? uploadProgress : '添加到衣橱'}</button>
      </>) : (<>
        <div className="form-group"><label className="form-label">选择多张图片</label>
          <input type="file" accept="image/*" multiple ref={batchRef} onChange={handleBatchImages} style={{ display: 'none' }} />
          {uploading ? (<div className="image-upload-area"><div className="upload-icon">⏳</div><div className="upload-text">{uploadProgress}</div></div>)
            : (<div className="image-upload-area" onClick={() => batchRef.current.click()}><div className="upload-icon">🖼️</div><div className="upload-text">点击选择多张图片</div></div>)}
          {batchImages.length > 0 && (<div className="batch-preview-grid">{batchImages.map((img, i) => (
            <div className="batch-preview-item" key={i}><img src={img} alt="" />
              <button className="batch-remove" onClick={() => setBatchImages(p => p.filter((_, j) => j !== i))}>✕</button></div>
          ))}</div>)}
        </div>
        <button className="btn-primary" disabled={!cat || !batchImages.length || uploading} onClick={handleBatchAdd}>
          {uploading ? uploadProgress : `批量添加 ${batchImages.length > 0 ? `(${batchImages.length} 件)` : ''}`}</button>
      </>)}
    </div>
  );
}

// ===== 分类管理 =====
function CategoryManager({ visible, onClose, categories, onUpdateCats }) {
  const [cats, setCats] = useState({});
  const [newCatName, setNewCatName] = useState('');

  useEffect(() => { if (visible) setCats(JSON.parse(JSON.stringify(categories))); }, [visible]);

  const renameCat = (oldName, newName) => {
    if (!newName.trim() || newName === oldName) return;
    const entries = Object.entries(cats);
    const newCats = {};
    entries.forEach(([k, v]) => { newCats[k === oldName ? newName.trim() : k] = v; });
    setCats(newCats);
  };
  const deleteCat = (name) => {
    const next = { ...cats }; delete next[name]; setCats(next);
  };
  const addCat = () => {
    const n = newCatName.trim();
    if (n && !cats[n]) { setCats({ ...cats, [n]: [] }); setNewCatName(''); }
  };
  const renameSubcat = (cat, idx, newName) => {
    const next = { ...cats, [cat]: [...cats[cat]] };
    next[cat][idx] = newName.trim();
    setCats(next);
  };
  const deleteSubcat = (cat, idx) => {
    const next = { ...cats, [cat]: cats[cat].filter((_, i) => i !== idx) };
    setCats(next);
  };
  const addSubcat = (cat) => {
    setCats({ ...cats, [cat]: [...(cats[cat] || []), '新子分类'] });
  };
  const handleSave = () => { onUpdateCats(cats); onClose(); };

  return (
    <div className={`modal-overlay ${visible ? 'show' : ''}`} onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" /><div className="modal-title">管理分类</div>
        {Object.entries(cats).map(([cat, subcats]) => (
          <div className="cat-mgr-group" key={cat}>
            <div className="cat-mgr-header">
              <span className="cat-icon">{getCatIcon(cat)}</span>
              <input className="cat-mgr-name-input" defaultValue={cat}
                onBlur={e => renameCat(cat, e.target.value)} />
              <button className="cat-mgr-delete" onClick={() => deleteCat(cat)}>✕</button>
            </div>
            <div className="cat-mgr-subcats">
              {subcats.map((sc, i) => (
                <div className="cat-mgr-subcat-row" key={i}>
                  <input className="cat-mgr-subcat-input" defaultValue={sc}
                    onBlur={e => renameSubcat(cat, i, e.target.value)} />
                  <button className="cat-mgr-sub-delete" onClick={() => deleteSubcat(cat, i)}>✕</button>
                </div>
              ))}
              <button className="cat-mgr-add-btn" onClick={() => addSubcat(cat)}>+ 添加子分类</button>
            </div>
          </div>
        ))}
        <div className="custom-subcat-input" style={{ marginTop: 12 }}>
          <input placeholder="新分类名称" value={newCatName} onChange={e => setNewCatName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addCat()} />
          <button onClick={addCat}>添加分类</button>
        </div>
        <button className="btn-primary" onClick={handleSave} style={{ marginTop: 16 }}>保存</button>
      </div>
    </div>
  );
}

// ===== 设置弹窗 =====
function SettingsModal({ visible, onClose, items, categories, onImport, onShowLog, onShowCatMgr, onStartBatchDelete, onForceSync }) {
  const importRef = useRef(null);
  const handleExport = () => {
    const data = { items, categories, exportDate: new Date().toISOString(), version: 1 };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `wardrobe-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
  };
  const handleImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.items || !Array.isArray(data.items)) { alert('文件格式不对'); return; }
        if (!confirm(`确认导入 ${data.items.length} 件衣服？当前数据会被替换。`)) return;
        onImport(data); onClose();
      } catch { alert('文件解析失败'); }
    };
    reader.readAsText(file); e.target.value = '';
  };

  return (
    <div className={`modal-overlay ${visible ? 'show' : ''}`} onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" /><div className="modal-title">设置</div>
        <div className="settings-list">
          <button className="settings-item" onClick={() => { onClose(); onShowCatMgr(); }}>
            <span className="s-icon">📂</span><div><div className="s-label">管理分类</div><div className="s-desc">编辑、重命名、删除分类和子分类</div></div></button>
          <button className="settings-item" onClick={handleExport}>
            <span className="s-icon">💾</span><div><div className="s-label">导出数据</div><div className="s-desc">下载 JSON 备份文件</div></div></button>
          <input type="file" accept=".json" ref={importRef} onChange={handleImport} style={{ display: 'none' }} />
          <button className="settings-item" onClick={() => importRef.current.click()}>
            <span className="s-icon">📂</span><div><div className="s-label">导入数据</div><div className="s-desc">从备份文件恢复</div></div></button>
          <button className="settings-item" onClick={() => { onClose(); onShowLog(); }}>
            <span className="s-icon">📋</span><div><div className="s-label">更新日志</div><div className="s-desc">当前版本 v{APP_VERSION}</div></div></button>
          <button className="settings-item" onClick={() => { onForceSync(); onClose(); }}>
            <span className="s-icon">🔄</span><div><div className="s-label">强制全量同步</div><div className="s-desc">将本机数据全部推送到云端（覆盖）</div></div></button>
          <button className="settings-item" onClick={() => { onClose(); onStartBatchDelete(); }}>
            <span className="s-icon">🗑️</span><div><div className="s-label">批量删除</div><div className="s-desc">选择并删除多件衣服</div></div></button>
        </div>
      </div>
    </div>
  );
}

// ===== 更新日志弹窗 =====
function UpdateLogModal({ visible, onClose }) {
  const handleClose = () => { localStorage.setItem('wardrobe_seen_version', APP_VERSION); onClose(); };
  return (
    <div className={`modal-overlay ${visible ? 'show' : ''}`} onClick={handleClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" /><div className="modal-title">🎉 更新日志</div>
        {UPDATE_LOG.map((entry, idx) => (
          <div key={entry.version}><div className="update-log-version">v{entry.version}</div><div className="update-log-date">{entry.date}</div>
            <ul className="update-log-list">{entry.changes.map((c, i) => <li key={i}>{c}</li>)}</ul>
            {idx < UPDATE_LOG.length - 1 && <div className="update-log-divider" />}</div>
        ))}
        <button className="btn-primary" onClick={handleClose} style={{ marginTop: 12 }}>知道了</button>
      </div>
    </div>
  );
}

// ===== 主 App =====
function App() {
  const [items, setItems] = useState(loadItems);
  const [categories, setCategories] = useState(loadCategories);
  const [tab, setTab] = useState('wardrobe');
  const [toast, setToast] = useState({ visible: false, message: '', undoFn: null });
  const [editItem, setEditItem] = useState(null);
  const [editVisible, setEditVisible] = useState(false);
  const [settingsVisible, setSettingsVisible] = useState(false);
  const [updateLogVisible, setUpdateLogVisible] = useState(false);
  const [catMgrVisible, setCatMgrVisible] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [selectMode, setSelectMode] = useState(false);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const toastTimer = useRef(null);

  useEffect(() => { saveItems(items); }, [items]);
  useEffect(() => { saveCategories(categories); }, [categories]);

  // 启动同步
  useEffect(() => {
    const localItems = loadItems();
    const localCats = loadCategories();
    setSyncing(true);
    Promise.all([sheetsCall({ action: 'load' }), sheetsCall({ action: 'loadConfig' })]).then(async ([ir, cr]) => {
      const si = ir?.items || [];
      const sc = cr?.customSubcats; // config里存的还是customSubcats key
      if (si.length > 0) {
        setItems(si);
        if (sc && Object.keys(sc).length > 0) setCategories(sc);
      } else if (localItems.length > 0) {
        for (const item of localItems) await sheetsCall({ action: 'add', data: JSON.stringify(item) });
        await sheetsCall({ action: 'saveConfig', data: JSON.stringify({ customSubcats: localCats }) });
      }
    }).finally(() => setSyncing(false));
  }, []);

  useEffect(() => { if (localStorage.getItem('wardrobe_seen_version') !== APP_VERSION) setUpdateLogVisible(true); }, []);

  const showToast = (msg, undoFn = null) => {
    clearTimeout(toastTimer.current);
    setToast({ visible: true, message: msg, undoFn });
    toastTimer.current = setTimeout(() => setToast(t => ({ ...t, visible: false })), 3000);
  };

  const handleWear = (id) => {
    const item = items.find(i => i.id === id); if (!item) return;
    const updated = { ...item, wearCount: item.wearCount + 1 };
    setItems(prev => prev.map(i => i.id === id ? updated : i));
    sheetsCall({ action: 'update', data: JSON.stringify(updated) });
    showToast(`${updated.name || updated.subcategory || updated.category} +1`, () => {
      const rev = { ...updated, wearCount: updated.wearCount - 1 };
      setItems(prev => prev.map(i => i.id === id ? rev : i));
      sheetsCall({ action: 'update', data: JSON.stringify(rev) });
    });
  };

  const handleAdd = (newItem) => {
    setItems(prev => [...prev, newItem]);
    sheetsCall({ action: 'add', data: JSON.stringify(newItem) });
    showToast(`已添加 ${newItem.name || newItem.subcategory || newItem.category}`);
  };

  const handleEdit = (item) => { setEditItem(item); setEditVisible(true); };
  const handleSaveEdit = (updated) => {
    setItems(prev => prev.map(i => i.id === updated.id ? updated : i));
    sheetsCall({ action: 'update', data: JSON.stringify(updated) });
    showToast('已保存');
  };
  const handleDelete = (id) => {
    const d = items.find(i => i.id === id);
    setItems(prev => prev.filter(i => i.id !== id));
    sheetsCall({ action: 'delete', id });
    showToast(`已删除 ${d?.name || d?.subcategory}`, () => {
      if (d) { setItems(prev => [...prev, d]); sheetsCall({ action: 'add', data: JSON.stringify(d) }); }
    });
  };

  const handleUpdateCats = (newCats) => {
    setCategories(newCats);
    sheetsCall({ action: 'saveConfig', data: JSON.stringify({ customSubcats: newCats }) });
  };

  const handleImport = async (data) => {
    setItems(data.items);
    if (data.categories) { setCategories(data.categories); }
    showToast('导入中...');
    const old = await sheetsCall({ action: 'load' });
    if (old?.items) { for (const i of old.items) await sheetsCall({ action: 'delete', id: i.id }); }
    for (const i of data.items) await sheetsCall({ action: 'add', data: JSON.stringify(i) });
    if (data.categories) await sheetsCall({ action: 'saveConfig', data: JSON.stringify({ customSubcats: data.categories }) });
    showToast(`已导入 ${data.items.length} 件衣服`);
  };

  const handleStartBatchDelete = () => {
    setSelectMode(true);
    setSelectedIds(new Set());
    setTab('wardrobe');
  };

  const handleForceSync = async () => {
    showToast('全量同步中...');
    setSyncing(true);
    // 先删 Sheets 里所有旧数据
    const old = await sheetsCall({ action: 'load' });
    if (old?.items) {
      for (const i of old.items) await sheetsCall({ action: 'delete', id: i.id });
    }
    // 逐条推送当前本地数据
    let ok = 0, fail = 0;
    for (const item of items) {
      const res = await sheetsCall({ action: 'add', data: JSON.stringify(item) });
      res?.success ? ok++ : fail++;
    }
    // 同步分类
    await sheetsCall({ action: 'saveConfig', data: JSON.stringify({ customSubcats: categories }) });
    setSyncing(false);
    showToast(`同步完成：${ok} 件成功${fail > 0 ? `，${fail} 件失败` : ''}`);
  };

  const handleToggleSelect = (id) => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const handleBatchDelete = async () => {
    const count = selectedIds.size;
    if (!count || !confirm(`确认删除选中的 ${count} 件衣服？`)) return;
    const ids = [...selectedIds];
    setItems(prev => prev.filter(i => !selectedIds.has(i.id)));
    setSelectMode(false);
    setSelectedIds(new Set());
    showToast(`已删除 ${count} 件`);
    for (const id of ids) await sheetsCall({ action: 'delete', id });
  };

  return (
    <>
      <div className="header">
        <div><h1>👗 衣橱</h1>
          <div className="header-subtitle">{syncing ? '同步中...' : items.length > 0 ? `${items.length} 件衣服 · ${items.filter(i => i.wearCount > 0).length} 件穿过` : '开始录入你的衣服吧'}</div>
        </div>
        <button className="header-gear" onClick={() => setSettingsVisible(true)}>⚙️</button>
      </div>
      <div className={`page ${tab === 'wardrobe' ? 'active' : ''}`}>
        <WardrobePage items={items} onWear={handleWear} onEdit={handleEdit} categories={categories}
          selectMode={selectMode} selectedIds={selectedIds} onToggleSelect={handleToggleSelect} />
      </div>
      <div className={`page ${tab === 'stats' ? 'active' : ''}`}>
        <StatsPage items={items} categories={categories} />
      </div>
      <div className={`page ${tab === 'add' ? 'active' : ''}`}>
        <AddPage onAdd={handleAdd} categories={categories} onUpdateCats={handleUpdateCats} />
      </div>
      <nav className="bottom-nav">
        <button className={`nav-item ${tab === 'wardrobe' ? 'active' : ''}`} onClick={() => setTab('wardrobe')}><span className="nav-icon">👗</span><span className="nav-label">衣橱</span></button>
        <button className={`nav-item ${tab === 'stats' ? 'active' : ''}`} onClick={() => setTab('stats')}><span className="nav-icon">📊</span><span className="nav-label">数据</span></button>
        <button className={`nav-item ${tab === 'add' ? 'active' : ''}`} onClick={() => setTab('add')}><span className="nav-icon">➕</span><span className="nav-label">添加</span></button>
      </nav>
      <Toast message={toast.message} onUndo={toast.undoFn} visible={toast.visible} />
      <EditModal item={editItem} visible={editVisible} onClose={() => setEditVisible(false)}
        onSave={handleSaveEdit} onDelete={handleDelete} categories={categories} onUpdateCats={handleUpdateCats} />
      <SettingsModal visible={settingsVisible} onClose={() => setSettingsVisible(false)}
        items={items} categories={categories} onImport={handleImport}
        onShowLog={() => setUpdateLogVisible(true)} onShowCatMgr={() => setCatMgrVisible(true)}
        onStartBatchDelete={handleStartBatchDelete} onForceSync={handleForceSync} />
      <UpdateLogModal visible={updateLogVisible} onClose={() => setUpdateLogVisible(false)} />
      <CategoryManager visible={catMgrVisible} onClose={() => setCatMgrVisible(false)}
        categories={categories} onUpdateCats={handleUpdateCats} />
      {selectMode && (
        <div className="select-bar">
          <span>已选 {selectedIds.size} 件</span>
          <div className="select-bar-actions">
            <button className="select-bar-btn cancel" onClick={() => { setSelectMode(false); setSelectedIds(new Set()); }}>取消</button>
            <button className="select-bar-btn delete" disabled={selectedIds.size === 0} onClick={handleBatchDelete}>删除</button>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js?v=1.4.0').then((reg) => {
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (newWorker) {
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'activated') {
            window.location.reload();
          }
        });
      }
    });
  }).catch(() => {});
}
</script>
</body>
</html>
